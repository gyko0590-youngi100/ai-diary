<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>관리자 대시보드 | MGB 멤버쉽+</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;background:#0f172a;color:#f8fafc}a{text-decoration:none;color:inherit}.wrap{width:min(1200px,calc(100% - 32px));margin:0 auto;padding:28px 0 80px}.nav,.card,.chart,.gate{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:0 18px 48px rgba(0,0,0,.28)}.nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 20px;margin-bottom:20px}.links{display:flex;gap:10px;flex-wrap:wrap}.links a,.logout{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);color:#94a3b8}.hero h1{margin:0 0 8px;font-size:38px}.muted{color:#94a3b8}.stats,.grid{display:grid;gap:14px}.stats{grid-template-columns:repeat(4,1fr);margin:16px 0}.grid{grid-template-columns:1.2fr .8fr}.card,.gate{padding:20px}.label{color:#94a3b8;font-size:13px}.value{font-size:28px;font-weight:900}.chart{padding:20px;height:280px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01))}.list{display:grid;gap:10px}.item{display:flex;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.04)}.hidden{display:none}@media(max-width:980px){.stats,.grid{grid-template-columns:1fr}}</style></head>
<body><div class="wrap"><div id="authGate" class="gate hidden"><h2>관리자 인증 필요</h2><p class="muted">관리자 로그인 후 접근 가능합니다.</p><a class="logout" href="./admin-login.html">관리자 로그인으로 이동</a></div><div id="adminPage" class="hidden"><div class="nav"><strong>MGB 멤버쉽+ 관리자</strong><div class="links"><a href="./index.html">메인</a><a href="./home.html">홈</a><a href="./newsletter.html">소식지</a><a href="./events.html">이벤트</a><a href="./winners.html">당첨 결과</a><button class="logout" id="logoutBtn">로그아웃</button></div></div><section class="hero"><h1>관리자 대시보드</h1><p class="muted">실제 JSON 데이터를 기준으로 접속자, 콘텐츠, 문의 현황을 불러오는 화면입니다.</p></section><section class="stats"><div class="card"><div class="label">등록 인원</div><div class="value" id="memberCount">-</div></div><div class="card"><div class="label">오늘 접속 로그</div><div class="value" id="todayAccessCount">-</div></div><div class="card"><div class="label">소식지 조회수</div><div class="value" id="newsletterViews">-</div></div><div class="card"><div class="label">이벤트 참여자</div><div class="value" id="eventParticipants">-</div></div></section><section class="grid"><div class="card"><h3>등록 관리자 정보</h3><div class="list" id="memberList"></div></div><div class="card"><h3>운영 요약</h3><div class="list"><div class="item"><span>이벤트 수</span><strong id="eventCount">-</strong></div><div class="item"><span>문의/건의 접수</span><strong id="inquiryCount">-</strong></div><div class="item"><span>최근 로그인</span><strong id="lastLogin">-</strong></div><div class="item"><span>최근 접속 페이지</span><strong id="lastPage">-</strong></div></div></div></section></div></div><script>
const authed=sessionStorage.getItem('mgbAdminAuth')==='true';
document.getElementById(authed?'adminPage':'authGate').classList.remove('hidden');
document.getElementById('logoutBtn')?.addEventListener('click',()=>{sessionStorage.removeItem('mgbAdminAuth');location.href='./admin-login.html';});
async function loadData(){
  if(!authed) return;
  const [members, accessLogs, newsletters, events, inquiries] = await Promise.all([
    fetch('./data/members.json').then(r=>r.json()),
    fetch('./data/access-log.json').then(r=>r.json()),
    fetch('./data/newsletters.json').then(r=>r.json()),
    fetch('./data/events.json').then(r=>r.json()),
    fetch('./data/inquiries.json').then(r=>r.json())
  ]);
  document.getElementById('memberCount').textContent = members.length;
  document.getElementById('todayAccessCount').textContent = accessLogs.length;
  document.getElementById('newsletterViews').textContent = newsletters.reduce((sum,n)=>sum+(n.views||0),0);
  document.getElementById('eventParticipants').textContent = events.reduce((sum,e)=>sum+(e.participants||0),0);
  document.getElementById('eventCount').textContent = events.length;
  document.getElementById('inquiryCount').textContent = inquiries.length;
  const lastMember = members[members.length-1];
  document.getElementById('lastLogin').textContent = lastMember?.lastLogin?.slice(0,16).replace('T',' ') || '-';
  const lastAccess = accessLogs[accessLogs.length-1];
  document.getElementById('lastPage').textContent = lastAccess?.page || '-';
  document.getElementById('memberList').innerHTML = members.map(member => `<div class="item"><span>${member.name} / ${member.employeeId}</span><strong>${member.department}</strong></div>`).join('');
}
loadData();
</script></body></html>
