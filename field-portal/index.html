<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGB 멤버쉽+</title>
  <style>
    :root {
      --bg:#08101f; --panel:rgba(15,23,42,.9); --panel2:rgba(30,41,59,.92); --line:rgba(255,255,255,.08);
      --text:#f8fafc; --muted:#94a3b8; --blue:#60a5fa; --shadow:0 18px 48px rgba(0,0,0,.28); --radius:24px;
    }
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(96,165,250,.16), transparent 28%),linear-gradient(180deg,#020617 0%,#0f172a 100%)}
    a{text-decoration:none;color:inherit}.wrap{width:min(1100px,calc(100% - 32px));margin:0 auto;padding:28px 0 80px}
    .nav,.hero,.panel,.menu{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(12px)}
    .nav{border-radius:18px;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}.admin-link{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--muted)}
    .hero{border-radius:30px;padding:40px 32px;margin-bottom:20px}.eyebrow{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--muted);font-size:14px}h1{font-size:clamp(34px,5vw,56px);line-height:1.12;margin:16px 0 10px}.lead{max-width:720px;color:var(--muted);font-size:18px}
    .panel{border-radius:24px;padding:24px;margin-top:20px}.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.menu{border-radius:22px;padding:22px;background:var(--panel2)}.menu h3{margin:0 0 8px;font-size:24px}.muted{color:var(--muted)}input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text)}button{width:100%;padding:14px 16px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-weight:800;margin-top:12px;cursor:pointer}.msg{margin-top:12px;color:#fbbf24;font-size:14px}.hidden{display:none}@media(max-width:900px){.login-grid,.menu-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <strong>MGB 멤버쉽+</strong>
      <a class="admin-link" href="./admin-login.html">관리자 보기</a>
    </div>

    <section class="hero">
      <span class="eyebrow">현장근무자 전용 멤버쉽 포털</span>
      <h1>MGB 멤버쉽+</h1>
      <p class="lead">등록된 멤버만 이름과 사번으로 로그인할 수 있습니다. 로그인 후 소식지와 이벤트 메뉴만 보이도록 구성한 1차 서비스형 시안입니다.</p>
    </section>

    <section class="panel" id="loginPanel">
      <h2>멤버 로그인</h2>
      <p class="muted">등록된 이름 + 사번이 일치해야 다음 화면으로 이동합니다.</p>
      <div class="login-grid">
        <input id="memberName" placeholder="이름" />
        <input id="memberId" placeholder="사번" />
      </div>
      <button id="loginBtn">로그인</button>
      <div class="msg" id="loginMsg">현재 등록된 멤버: 고규영 / 235878</div>
    </section>

    <section class="panel hidden" id="memberMenu">
      <h2>서비스 메뉴</h2>
      <p class="muted">로그인된 멤버만 접근 가능한 메뉴입니다.</p>
      <div class="menu-grid">
        <a class="menu" href="./newsletter.html"><h3>MGB 멤버쉽+</h3><p class="muted">월별 소식지, 공지, 멤버십 콘텐츠 보기</p></a>
        <a class="menu" href="./events.html"><h3>이벤트 보기</h3><p class="muted">진행중인 이벤트와 참여 안내 확인</p></a>
      </div>
    </section>
  </div>

  <script>
    const allowedName = '고규영';
    const allowedId = '235878';
    const loginBtn = document.getElementById('loginBtn');
    const loginMsg = document.getElementById('loginMsg');
    const loginPanel = document.getElementById('loginPanel');
    const memberMenu = document.getElementById('memberMenu');

    loginBtn.addEventListener('click', () => {
      const name = document.getElementById('memberName').value.trim();
      const id = document.getElementById('memberId').value.trim();
      if (name === allowedName && id === allowedId) {
        sessionStorage.setItem('mgbMemberAuth', 'true');
        sessionStorage.setItem('mgbMemberName', name);
        loginPanel.classList.add('hidden');
        memberMenu.classList.remove('hidden');
        loginMsg.textContent = `${name}님 로그인 완료`;
      } else {
        loginMsg.textContent = '이름 또는 사번이 일치하지 않습니다.';
      }
    });

    if (sessionStorage.getItem('mgbMemberAuth') === 'true') {
      loginPanel.classList.add('hidden');
      memberMenu.classList.remove('hidden');
    }
  </script>
</body>
</html>
