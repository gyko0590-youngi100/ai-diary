<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 | MGB 멤버쉽+</title>
  <style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;background:#0f172a;color:#f8fafc}a{text-decoration:none;color:inherit}.wrap{width:min(720px,calc(100% - 32px));margin:0 auto;padding:40px 0}.card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:26px;box-shadow:0 18px 48px rgba(0,0,0,.28)}.muted{color:#94a3b8}input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#f8fafc;margin-bottom:12px}button{width:100%;padding:14px 16px;border:0;border-radius:14px;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#fff;font-weight:800}.msg{margin-top:12px;color:#fbbf24}.top{margin-bottom:16px;display:inline-block;color:#94a3b8}</style>
</head>
<body>
  <div class="wrap">
    <a class="top" href="./index.html">← 메인으로</a>
    <div class="card">
      <h1>관리자 로그인</h1>
      <p class="muted">관리자 보기 진입 시 아이디 / 비밀번호가 일치해야 대시보드로 이동합니다.</p>
      <input id="adminId" placeholder="아이디" />
      <input id="adminPw" type="password" placeholder="비밀번호" />
      <button id="adminLoginBtn">관리자 로그인</button>
      <div class="msg" id="adminMsg">관리자 계정: gyko95 / 0590</div>
    </div>
  </div>
  <script>
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
      const id = document.getElementById('adminId').value.trim();
      const pw = document.getElementById('adminPw').value.trim();
      if (id === 'gyko95' && pw === '0590') {
        sessionStorage.setItem('mgbAdminAuth', 'true');
        location.href = './admin.html';
      } else {
        document.getElementById('adminMsg').textContent = '아이디 또는 비밀번호가 일치하지 않습니다.';
      }
    });
  </script>
</body>
</html>
