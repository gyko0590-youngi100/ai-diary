<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎖️ 용기백배 특수부대 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #232340;
      --bg-card: #1e1e35;
      --text-primary: #f0f0f5;
      --text-secondary: #9090a0;
      --accent-green: #4ade80;
      --accent-red: #f87171;
      --accent-yellow: #fbbf24;
      --accent-blue: #60a5fa;
      --accent-purple: #a78bfa;
      --accent-pink: #f472b6;
      --accent-orange: #fb923c;
      --accent-cyan: #22d3ee;
      --border-color: #2a2a4a;
      --sidebar-width: 240px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      word-break: keep-all;
    }

    /* 로그인 */
    .login-screen {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .login-icon { font-size: 4rem; margin-bottom: 20px; }
    .login-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .login-subtitle { color: var(--text-secondary); margin-bottom: 32px; }

    .login-input {
      width: 100%;
      padding: 16px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 8px;
      margin-bottom: 16px;
    }

    .login-input:focus { outline: none; border-color: var(--accent-purple); }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .login-error { color: var(--accent-red); margin-top: 16px; display: none; }

    /* 앱 레이아웃 */
    .app { display: none; }
    .app.active { display: flex; min-height: 100vh; }

    /* 사이드바 */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .sidebar-logo-icon { font-size: 1.8rem; }

    .nav-menu { padding: 16px 0; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--accent-purple);
      border-left-color: var(--accent-purple);
    }

    .nav-icon { font-size: 1.2rem; width: 24px; text-align: center; }

    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid var(--border-color);
    }

    .logout-btn {
      width: 100%;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: var(--accent-red);
      color: white;
      border-color: var(--accent-red);
    }

    /* 메인 */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 32px;
      background: var(--bg-primary);
    }

    .page { display: none; }
    .page.active { display: block; }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-subtitle { color: var(--text-secondary); }

    /* 카드 */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* 테이블 */
    .team-table {
      width: 100%;
      border-collapse: collapse;
    }

    .team-table th,
    .team-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .team-table th {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .team-table td { font-size: 0.95rem; }

    .agent-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .agent-icon { font-size: 1.5rem; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .status-active {
      background: rgba(74, 222, 128, 0.15);
      color: var(--accent-green);
    }

    .status-pending {
      background: rgba(251, 191, 36, 0.15);
      color: var(--accent-yellow);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* 시스템 구조 */
    .arch-flow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 20px 0;
    }

    .arch-box {
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      min-width: 140px;
    }

    .arch-box.user { border-color: var(--accent-blue); }
    .arch-box.telegram { border-color: var(--accent-purple); }
    .arch-box.openclaw { border-color: var(--accent-green); }
    .arch-box.claude { border-color: var(--accent-orange); }

    .arch-box-icon { font-size: 1.5rem; margin-bottom: 8px; }
    .arch-box-label { font-size: 0.85rem; color: var(--text-secondary); }

    .arch-arrow { color: var(--text-secondary); font-size: 1.5rem; }

    /* 업무일지 */
    .log-item {
      background: var(--bg-tertiary);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .log-date {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--accent-purple);
    }

    .log-content { color: var(--text-secondary); }
    .log-content ul { padding-left: 20px; margin-top: 8px; }
    .log-content li { margin: 6px 0; }

    /* 캐릭터 카드 */

      </section>

  <script>
    const CORRECT_PASSWORD = '0590';

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      if (input === CORRECT_PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').classList.add('active');
        sessionStorage.setItem('yong-auth', 'true');
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }

    document.getElementById('passwordInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkPassword();
    });

    if (sessionStorage.getItem('yong-auth') === 'true') {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').classList.add('active');
    }

    function logout() {
      sessionStorage.removeItem('yong-auth');
      location.reload();
    }

    function showPage(pageId, element) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      element.classList.add('active');
    }
  </script>
